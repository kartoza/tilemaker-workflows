master_process off;
worker_processes 1;
daemon off;
pid /tmp/nginx.pid;
error_log /dev/stderr;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    gzip            on;
    gzip_types      application/json application/x-protobuf text/css application/javascript;

    # Temp paths for running without dedicated user
    client_body_temp_path /tmp/nginx_client_body;
    proxy_temp_path       /tmp/nginx_proxy;
    fastcgi_temp_path     /tmp/nginx_fastcgi;
    uwsgi_temp_path       /tmp/nginx_uwsgi;
    scgi_temp_path        /tmp/nginx_scgi;

    access_log /dev/stdout;

    server {
        listen 80;
        server_name _;

        # Static content: viewer, styles, fonts
        location / {
            root /static;
            try_files $uri $uri/ =404;
            add_header Access-Control-Allow-Origin *;
        }

        # Reverse proxy to mbtileserver
        location /services/ {
            proxy_pass http://127.0.0.1:8000/services/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header Access-Control-Allow-Origin *;
        }
    }
}
