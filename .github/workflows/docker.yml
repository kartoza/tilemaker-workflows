name: Build and publish Docker image

on:
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build Nix base image
        run: |
          nix build .#dockerImage -o result

      - name: Download fonts
        run: |
          nix run .#getData

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Load Nix base image
        run: |
          docker load < result

      - name: Build and tag final image
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          docker build -t "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}" \
                       -t "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" \
                       -f Dockerfile .

      - name: Push to GHCR
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          docker push "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}"
          docker push "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"

      - name: Export image as tarball
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          docker save "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}" | gzip > tilemaker-server-${VERSION}.tar.gz

      - name: Attach image tarball to release
        uses: softprops/action-gh-release@v2
        with:
          files: tilemaker-server-*.tar.gz
