<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Planet Tiles Viewer</title>
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  #map { position: absolute; top: 0; bottom: 32px; left: 0; right: 0; }
  #footer {
    position: absolute; bottom: 0; left: 0; right: 0; height: 32px;
    background: #1a1a2e; color: #aaa; display: flex; align-items: center;
    justify-content: center; font-size: 12px; gap: 8px;
  }
  #footer a { color: #7ec8e3; text-decoration: none; }
  #footer a:hover { text-decoration: underline; }
  #info {
    position: absolute; top: 10px; left: 10px; background: rgba(26,26,46,0.92);
    color: #eee; padding: 12px 14px; border-radius: 8px; font-size: 12px;
    z-index: 10; max-width: 320px; line-height: 1.5;
    backdrop-filter: blur(6px); border: 1px solid rgba(255,255,255,0.08);
  }
  #info h3 { margin: 0 0 6px; font-size: 14px; color: #7ec8e3; }
  #zoom-level { font-weight: bold; color: #ffd700; }
  #style-switcher {
    display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px;
  }
  #style-switcher button {
    flex: 1 1 auto; padding: 6px 8px; border: 1px solid rgba(255,255,255,0.15);
    border-radius: 5px; background: rgba(255,255,255,0.06); color: #ccc;
    font-size: 11px; cursor: pointer; transition: all 0.2s;
  }
  #style-switcher button:hover {
    background: rgba(255,255,255,0.12);
  }
  #style-switcher button.active {
    background: rgba(100,180,255,0.2); border-color: #7ec8e3; color: #fff;
  }
</style>
</head>
<body>
<div id="map"></div>
<div id="info">
  <h3>Planet Tiles Viewer</h3>
  Zoom: <span id="zoom-level">2</span>
  <div id="style-switcher">
    <button class="active" data-style="classic">Classic</button>
    <button data-style="neon">Neon</button>
    <button data-style="muted">Muted</button>
    <button data-style="african">African</button>
    <button data-style="psychedelic">Psychedelic</button>
    <button data-style="sketch">Sketch</button>
    <button data-style="kartoza">Kartoza</button>
    <button data-style="blueprint">Blueprint</button>
    <button data-style="grayscale">Grayscale</button>
    <button data-style="panopoly">Panopoly</button>
    <button data-style="ye-olde">Ye Olde</button>
    <button data-style="scifi">Sci-Fi</button>
    <button data-style="biologic">Biologic</button>
    <button data-style="sketch2">Sketch 2</button>
    <button data-style="noir">Noir</button>
    <button data-style="pointillist">Pointillist</button>
    <button data-style="places">Places</button>
    <button data-style="infrared">Infrared</button>
    <button data-style="matrix">Matrix</button>
    <button data-style="hazard">Hazard</button>
    <button data-style="beach-ball">Beach Ball</button>
  </div>
</div>
<div id="footer">
  Made with &#x1F497; by <a href="https://kartoza.com">Kartoza</a> |
  <a href="https://github.com/sponsors/timlinux">Donate!</a> |
  <a href="https://github.com/timlinux/tilemaker-workflows">GitHub</a>
</div>
<script>
window.onerror = function(msg, url, line, col, err) {
  document.getElementById("info").innerHTML += '<br><span style="color:#ff4444;font-size:10px">ERROR: ' + msg + ' (line ' + line + ')</span>';
};

let currentStyle = "classic";
const origin = window.location.origin;
const styleCache = {};

function resolveUrls(obj) {
  const str = JSON.stringify(obj);
  return JSON.parse(str.replace(/"(\/(?:services|fonts|styles)\/[^"]*?)"/g, '"' + origin + '$1"'));
}

async function loadStyle(name) {
  if (styleCache[name]) return styleCache[name];
  const resp = await fetch(origin + "/styles/" + name + ".json");
  const style = resolveUrls(await resp.json());
  styleCache[name] = style;
  return style;
}

async function init() {
  const style = await loadStyle("classic");
  const map = new maplibregl.Map({
    container: "map",
    style: style,
    center: [0, 20],
    zoom: 2,
    hash: true
  });

  map.addControl(new maplibregl.NavigationControl(), "top-right");
  map.addControl(new maplibregl.ScaleControl(), "bottom-left");
  map.addControl(new maplibregl.AttributionControl({
    compact: true,
    customAttribution: [
      '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      '<a href="https://openmaptiles.org/">OpenMapTiles</a>',
      'Icons: <a href="https://github.com/mapbox/maki">Maki</a> &amp; <a href="https://github.com/rapideditor/temaki">Temaki</a> (CC0)',
      '<a href="https://www.naturalearthdata.com/">Natural Earth</a>'
    ]
  }), "bottom-right");

  const zoomEl = document.getElementById("zoom-level");
  map.on("move", () => { zoomEl.textContent = map.getZoom().toFixed(1); });

  document.querySelectorAll("#style-switcher button").forEach(btn => {
    btn.addEventListener("click", async () => {
      const name = btn.dataset.style;
      if (name === currentStyle) return;
      currentStyle = name;
      const center = map.getCenter();
      const zoom = map.getZoom();
      const bearing = map.getBearing();
      const pitch = map.getPitch();
      const newStyle = await loadStyle(name);
      map.setStyle(newStyle);
      map.once("style.load", () => {
        map.jumpTo({ center, zoom, bearing, pitch });
      });
      document.querySelectorAll("#style-switcher button").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
    });
  });
}

init();
</script>
</body>
</html>
